<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="calc">
        <input type="number" id="firstnumber"></input>
        <select name="operator"   id="operator">
            <option value="plus">+</option>
            <option value="minus">-</option>
            <option value="multiplication">*</option>
            <option value="division">/</option>
        </select>
        <input type="number" id="secondnumber"></input>
        <button type="button" id="butt">выполнить действие</button>
    </div>
    <p id="result"></p>
</body>

<script>
    document.getElementById('butt').addEventListener('click',e=>{
        if(document.getElementById('operator').value == "plus" ){
            let result = (Number(document.getElementById('firstnumber').value)) + (Number (document.getElementById('secondnumber').value))
            document.getElementById('result').innerText = result
        }
        else if(document.getElementById('operator').value == "minus"){
            let result = document.getElementById('firstnumber').value - document.getElementById('secondnumber').value
            document.getElementById('result').innerText = result
        }
        else if(document.getElementById('operator').value == "multiplication"){
            let result = (document.getElementById('firstnumber').value) * document.getElementById('secondnumber').value
            document.getElementById('result').innerText = result
        }
        else if(document.getElementById('operator').value == "division"){
            if(document.getElementById('secondnumber').value == 0){
                alert('На ноль делить нельзя')
            }
            else{
            let result = document.getElementById('firstnumber').value / document.getElementById('secondnumber').value
            document.getElementById('result').innerText = result
            }
        }
    })


</script>


</html>
